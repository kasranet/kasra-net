<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>GapGPT AI Chat</title>
  <style>
    body { font-family: sans-serif; background:#f5f5f5; padding:20px; }
    .box { max-width:700px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
    textarea { width:100%; height:100px; }
    button { padding:10px 20px; margin-top:10px; cursor:pointer; }
    #res { margin-top:20px; white-space:pre-wrap; background:#111; color:#0f0; padding:10px; border-radius:8px; }
  </style>
</head>
<body>

<div class="box">
  <h2>چت با هوش مصنوعی</h2>

  <textarea id="input" placeholder="پیام خود را بنویس..."></textarea>
  <br>
  <button onclick="send()">ارسال</button>

  <div id="res"></div>
</div>

<script>
const WORKER_URL = "https://kasrakafinet.workers.dev";
const API_KEY = "sk-QrusuybuUSEB9BRxFxu1J560YNRHsDfNfaxnoFaYKIgqbHJe";

async function sendMessage(text) {
  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [
        { role: "user", content: text }
      ]
    })
  });

  const data = await res.json();
  return data?.choices?.[0]?.message?.content;
}
</script>

</body>
</html>

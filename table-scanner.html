<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<title>تبدیل عکس جدول به اکسل</title>
<style>
    body {
        font-family: sans-serif;
        direction: rtl;
        padding: 20px;
        background: #f4f4f4;
    }
    .upload-box {
        border: 2px dashed #888;
        padding: 40px;
        text-align: center;
        background: #fff;
        cursor: pointer;
    }
    #preview {
        margin-top: 20px;
        max-width: 100%;
        display: none;
    }
    .buttons {
        margin-top: 20px;
    }
    .buttons button {
        padding: 10px 20px;
        margin-left: 10px;
        font-size: 15px;
        cursor: pointer;
    }
    #loading {
        display: none;
        margin-top: 20px;
        font-size: 18px;
        color: #33a;
    }
</style>
</head>

<body>

<h2>تبدیل عکس جدول به اکسل (نسخه حرفه‌ای)</h2>

<div id="drop-area" class="upload-box">
    آپلود یا Drag & Drop تصویر
    <br><br>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
</div>

<img id="preview" />

<div class="buttons">
    <button id="analyzeBtn">تحلیل جدول</button>
    <button id="removeBtn">حذف</button>
</div>

<div id="loading">در حال پردازش...</div>

<script>
const dropArea = document.getElementById('drop-area');
const input = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const loading = document.getElementById('loading');
const analyzeBtn = document.getElementById('analyzeBtn');
const removeBtn = document.getElementById('removeBtn');

// Click -> open file picker
dropArea.addEventListener('click', () => input.click());

// Drag & Drop
dropArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropArea.style.borderColor = "#33a";
});
dropArea.addEventListener('dragleave', () => {
    dropArea.style.borderColor = "#888";
});
dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dropArea.style.borderColor = "#888";
    const file = e.dataTransfer.files[0];
    loadImage(file);
});

// Input change
input.addEventListener('change', () => {
    loadImage(input.files[0]);
});

// Load preview
function loadImage(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        preview.src = reader.result;
        preview.style.display = "block";
    };
    reader.readAsDataURL(file);
}

// Analyze button
analyzeBtn.addEventListener('click', () => {
    if (preview.src === "") {
        alert("ابتدا تصویر جدول را آپلود کنید.");
        return;
    }
    loading.style.display = "block";

    // شبیه‌سازی درخواست
    setTimeout(() => {
        loading.style.display = "none";
        alert("تحلیل جدول انجام شد! (اینجا باید الگوریتم OCR/پردازش اضافه شود)");
    }, 2000);
});

// Remove button
removeBtn.addEventListener('click', () => {
    preview.src = "";
    preview.style.display = "none";
    input.value = "";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>📊 تبدیل عکس جدول به اکسل</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:tahoma;
background:#f4f6fb;
margin:0;
padding:40px;
text-align:center
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,.1)
}

h1{
margin-top:0;
font-size:26px
}

.drop-area{
border:2px dashed #999;
border-radius:10px;
padding:30px;
margin-top:20px;
cursor:pointer;
transition:.2s
}

.drop-area:hover{
background:#f0f4ff
}

#preview{
max-width:100%;
margin-top:20px;
border-radius:8px;
display:none
}

.buttons{
margin-top:20px
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px
}

#analyzeBtn{
background:#4a7cff;
color:white
}

#removeBtn{
background:#e74c3c;
color:white
}

.loader{
display:none;
margin-top:20px;
font-size:15px;
color:#444
}

.result{
margin-top:20px;
font-size:14px;
color:#333
}

</style>

</head>


<body>

<div class="container">

<h1>📊 تبدیل عکس جدول به اکسل (نسخه حرفه‌ای)</h1>

<div class="drop-area" id="dropArea">

<p>آپلود یا Drag & Drop تصویر</p>

<input type="file" id="fileInput" accept="image/*" hidden>

<img id="preview">

</div>


<div class="buttons">

<button id="analyzeBtn">تحلیل جدول</button>

<button id="removeBtn">حذف</button>

</div>


<div class="loader" id="loader">

در حال پردازش...

</div>


<div class="result" id="result"></div>

</div>


<script>

const dropArea = document.getElementById("dropArea")
const fileInput = document.getElementById("fileInput")
const preview = document.getElementById("preview")

const analyzeBtn = document.getElementById("analyzeBtn")
const removeBtn = document.getElementById("removeBtn")

const loader = document.getElementById("loader")
const result = document.getElementById("result")

let selectedFile = null



dropArea.addEventListener("click",()=>fileInput.click())


fileInput.addEventListener("change",(e)=>{

const file = e.target.files[0]

handleFile(file)

})


dropArea.addEventListener("dragover",(e)=>{

e.preventDefault()

dropArea.style.background="#eef3ff"

})


dropArea.addEventListener("dragleave",()=>{

dropArea.style.background=""

})


dropArea.addEventListener("drop",(e)=>{

e.preventDefault()

dropArea.style.background=""

const file = e.dataTransfer.files[0]

handleFile(file)

})



function handleFile(file){

if(!file)return

if(!file.type.startsWith("image")){

alert("فقط فایل تصویری مجاز است")

return

}

selectedFile = file

const reader = new FileReader()

reader.onload = function(e){

preview.src = e.target.result

preview.style.display="block"

}

reader.readAsDataURL(file)

}



removeBtn.onclick = ()=>{

selectedFile = null

preview.src=""

preview.style.display="none"

result.innerHTML=""

fileInput.value=""

}



async function compressImage(file){

const bitmap = await createImageBitmap(file)

const canvas = document.createElement("canvas")

let width = bitmap.width
let height = bitmap.height

const maxWidth = 1200

if(width > maxWidth){

height = height * (maxWidth/width)
width = maxWidth
}

canvas.width = width
canvas.height = height

const ctx = canvas.getContext("2d")

ctx.drawImage(bitmap,0,0,width,height)

return canvas.toDataURL("image/jpeg",0.7)

}



analyzeBtn.onclick = async ()=>{

if(!selectedFile){

alert("ابتدا تصویر انتخاب کنید")

return

}

loader.style.display="block"

result.innerHTML=""



try{

const base64 = await compressImage(selectedFile)

const response = await fetch("https://kasrakafinet.hosseinghanbari08.workers.dev",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

image:base64

})

})

const data = await response.json()

const csv = data.csv || data.choices?.[0]?.message?.content

if(!csv){

throw new Error("پاسخ API معتبر نیست")

}

generateExcel(csv)

loader.style.display="none"

result.innerHTML="✅ فایل اکسل آماده دانلود شد"

}

catch(err){

loader.style.display="none"

result.innerHTML="❌ خطا: "+err.message

}

}



function generateExcel(csv){

const rows = csv.trim().split("\n").map(r=>r.split(","))

const worksheet = XLSX.utils.aoa_to_sheet(rows)

const workbook = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(workbook,worksheet,"Sheet1")

XLSX.writeFile(workbook,"table.xlsx")

}



</script>

</body>

</html>

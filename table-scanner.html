<!DOCTYPE html>
<html lang="fa">
<head>

<meta charset="UTF-8">
<title>تبدیل عکس جدول به اکسل</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:tahoma;
direction:rtl;
background:#f5f5f5;
padding:40px;
text-align:center;
}

#drop{
border:2px dashed #777;
padding:40px;
background:white;
cursor:pointer;
}

#preview{
max-width:400px;
margin-top:20px;
display:none;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

#loading{
display:none;
color:#1b63ff;
font-size:18px;
margin-top:20px;
}

</style>

</head>

<body>

<h2>📊 تبدیل عکس جدول به اکسل (نسخه حرفه‌ای)</h2>

<div id="drop">
آپلود یا Drag & Drop تصویر
<br><br>
<input type="file" id="fileInput" accept="image/*" hidden>
</div>

<img id="preview">

<br>

<button id="analyze">تحلیل جدول</button>
<button id="remove">حذف</button>

<div id="loading">در حال پردازش...</div>

<script>

const drop = document.getElementById("drop");
const input = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const analyze = document.getElementById("analyze");
const remove = document.getElementById("remove");
const loading = document.getElementById("loading");

let selectedFile = null;

drop.onclick = () => input.click();

input.onchange = () => {

selectedFile = input.files[0];

const reader = new FileReader();

reader.onload = () => {

preview.src = reader.result;
preview.style.display = "block";

};

reader.readAsDataURL(selectedFile);

};

drop.addEventListener("dragover", e => {
e.preventDefault();
});

drop.addEventListener("drop", e => {

e.preventDefault();

selectedFile = e.dataTransfer.files[0];

const reader = new FileReader();

reader.onload = () => {

preview.src = reader.result;
preview.style.display = "block";

};

reader.readAsDataURL(selectedFile);

});

function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader = new FileReader();

reader.onload = ()=>{

const base64 = reader.result.split(",")[1];
resolve(base64);

};

reader.onerror = reject;

reader.readAsDataURL(file);

});

}

analyze.onclick = async ()=>{

if(!selectedFile){
alert("ابتدا تصویر انتخاب کنید");
return;
}

loading.style.display="block";

const base64 = await fileToBase64(selectedFile);

const res = await fetch("https://table-worker.yourdomain.workers.dev",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_GAPGPT_KEY"
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{
role:"user",
content:[
{
type:"text",
text:"Extract the table from this image and return ONLY CSV format without explanation."
},
{
type:"image_url",
image_url:{
url:"data:image/png;base64,"+base64
}
}
]
}
]

})

});

const data = await res.json();

loading.style.display="none";

const csv = data.choices[0].message.content;

downloadExcel(csv);

};

function downloadExcel(csv){

const rows = csv.trim().split("\n").map(r=>r.split(","));

const worksheet = XLSX.utils.aoa_to_sheet(rows);

const workbook = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(workbook,worksheet,"Table");

XLSX.writeFile(workbook,"table.xlsx");

}

remove.onclick = ()=>{

preview.src="";
preview.style.display="none";
input.value="";
selectedFile=null;

};

</script>

</body>
</html>
